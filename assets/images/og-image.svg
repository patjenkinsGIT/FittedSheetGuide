<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&amp;family=DM+Sans:wght@300;400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#f5f0e8"/>

  <!-- Subtle border -->
  <rect x="40" y="40" width="1120" height="550" rx="16" fill="#fdfcf9" stroke="#d4c9b0" stroke-width="1.5"/>

  <!-- Eyebrow -->
  <text x="600" y="145" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="16" font-weight="500" letter-spacing="3" fill="#6b7c6e" text-transform="uppercase">HOME · LAUNDRY · LINEN CARE</text>

  <!-- Title line 1 -->
  <text x="600" y="235" text-anchor="middle" font-family="'DM Serif Display', Georgia, serif" font-size="64" fill="#1a1714">How to Fold a Fitted Sheet</text>

  <!-- Title line 2 (italic, rust) -->
  <text x="600" y="310" text-anchor="middle" font-family="'DM Serif Display', Georgia, serif" font-size="58" font-style="italic" fill="#b85c38">That Actually Works</text>

  <!-- Divider -->
  <line x1="520" y1="350" x2="680" y2="350" stroke="#d4c9b0" stroke-width="1.5"/>

  <!-- Subtitle -->
  <text x="600" y="400" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="22" font-weight="300" fill="#4a4540">Interactive step-by-step guide · Two methods · No jargon</text>

  <!-- Badges row -->
  <g transform="translate(600, 470)">
    <!-- Badge: Standing method -->
    <rect x="-280" y="-18" width="160" height="36" rx="18" fill="#fdfcf9" stroke="#d4c9b0" stroke-width="1"/>
    <text x="-200" y="6" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="14" fill="#4a4540">Standing method</text>

    <!-- Badge: Flat surface -->
    <rect x="-90" y="-18" width="180" height="36" rx="18" fill="#fdfcf9" stroke="#d4c9b0" stroke-width="1"/>
    <text x="0" y="6" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="14" fill="#4a4540">Flat surface method</text>

    <!-- Badge: Works every time -->
    <rect x="120" y="-18" width="170" height="36" rx="18" fill="#fdfcf9" stroke="#d4c9b0" stroke-width="1"/>
    <text x="205" y="6" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="14" fill="#4a4540">Works every time</text>
  </g>

  <!-- Domain -->
  <text x="600" y="545" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="18" font-weight="500" fill="#8a837a">fittedsheetguide.com</text>
</svg>
